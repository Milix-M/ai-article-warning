<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Article Warning</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI Article Warning</h1>
      <p class="subtitle">Zenn・Qiita AI記事検出</p>
    </header>

    <div class="status-section">
      <div id="current-page-status" class="status-box">
        <span class="loading">チェック中...</span>
      </div>
      <p class="status-help" id="status-help">
        ZennまたはQiitaの記事ページを開くと、自動でAIっぽさを分析します
      </p>
    </div>

    <div class="settings-section">
      <h2>⚙️ 設定</h2>
      
      <label class="setting-item">
        <span>警告を表示する閾値</span>
        <select id="threshold">
          <option value="3">低（3点以上）</option>
          <option value="5" selected>中（5点以上）</option>
          <option value="10">高（10点以上）</option>
          <option value="15">最高（15点以上）</option>
        </select>
      </label>

      <label class="setting-item">
        <span>詳細表示</span>
        <input type="checkbox" id="show-details" checked>
      </label>

      <label class="setting-item">
        <span>Zennで有効</span>
        <input type="checkbox" id="enable-zenn" checked>
      </label>

      <label class="setting-item">
        <span>Qiitaで有効</span>
        <input type="checkbox" id="enable-qiita" checked>
      </label>
    </div>

    <div class="actions">
      <button id="analyze-btn" class="btn btn-primary">
        🔍 今のページを分析
      </button>
    </div>

    <footer>
      <a href="https://github.com/Milix-M/ai-article-warning" target="_blank">
        GitHub
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
